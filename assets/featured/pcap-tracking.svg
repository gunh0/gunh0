<svg width="400" height="104" viewBox="0 0 400 104" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="12 pcap-tracking — Real-time network packet capture and monitoring system built with Go + Next.js and live WebSocket updates">
  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      fill: #1f2328;
    }
    .num { font-size: 11px; font-weight: 700; font-family: "SFMono-Regular", Consolas, Menlo, monospace; }
    .name { font-size: 13.5px; font-weight: 700; }
    .star { font-size: 12px; font-weight: 700; }
    .desc { font-size: 11.5px; fill: #6e7781; }
    .blob { animation: drift 18s ease-in-out infinite alternate; }
    .tile { animation: rise 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.65s backwards; }
    @keyframes drift { to { transform: translate(-30px, 18px); } }
    @keyframes rise { from { opacity: 0; transform: translateY(12px); } }
  </style>

  <defs>
    <filter id="t-blur" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <clipPath id="t-clip">
      <rect width="400" height="104" rx="16"/>
    </clipPath>
  </defs>

  <g class="tile">
    <rect width="400" height="104" rx="16" fill="#f2f4f8"/>
    <g clip-path="url(#t-clip)">
      <circle class="blob" cx="340" cy="8" r="80" fill="#FF9F0A" opacity="0.24" filter="url(#t-blur)"/>
    </g>
    <rect x="2" y="2" width="396" height="100" rx="14"
          fill="rgba(255,255,255,0.62)" stroke="rgba(255,255,255,0.95)" stroke-width="1.5"/>
    <rect x="8" y="12" width="5" height="80" rx="2.5" fill="#FF9F0A" opacity="0.85"/>

    <rect x="24" y="15" width="34" height="21" rx="7" fill="#FF9F0A" opacity="0.13"/>
    <text x="41" y="30" text-anchor="middle" class="num" fill="#FF9F0A">12</text>
    <text x="68" y="30" class="name">pcap-tracking</text>
    <text x="384" y="31" text-anchor="end" class="star" fill="#FF9F0A">&#9733; 3</text>
    <text x="20" y="60" class="desc">Real-time network packet capture and monitoring system</text>
    <text x="20" y="78" class="desc">built with Go + Next.js and live WebSocket updates</text>
  </g>
</svg>
