<svg width="820" height="112" viewBox="0 0 820 112" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="How to reach me — click this card to connect on LinkedIn">
  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      fill: #1f2328;
    }
    .eyebrow { font-size: 15px; font-weight: 700; letter-spacing: 3px; }
    .btn-label { font-size: 13px; font-weight: 700; fill: #ffffff; letter-spacing: 0.5px; }
    .in-glyph { font-size: 17px; font-weight: 800; fill: #ffffff; }
    .blob { animation: drift 14s ease-in-out infinite alternate; }
    .sheen { animation: sweep 2.4s ease-in-out 0.6s 1 both; }
    .btn {
      transform-box: fill-box;
      transform-origin: center;
      animation: pulse 2.2s ease-in-out infinite;
    }
    .ring {
      transform-box: fill-box;
      transform-origin: center;
      animation: ping 2.2s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    @keyframes drift { to { transform: translate(60px, 10px); } }
    @keyframes sweep { to { transform: translateX(1300px) skewX(-16deg); } }
    @keyframes pulse { 50% { transform: scale(1.04); } }
    @keyframes ping { 75%, 100% { transform: scale(1.12); opacity: 0; } }
  </style>

  <defs>
    <filter id="ct-blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="ct-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1f2328" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="ct-sheen-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="ct-clip">
      <rect x="12" y="12" width="796" height="88" rx="20"/>
    </clipPath>
  </defs>

  <!-- backdrop + LinkedIn-blue aurora -->
  <rect width="820" height="112" rx="24" fill="#f2f4f8"/>
  <g clip-path="url(#ct-clip)">
    <circle class="blob" cx="150" cy="30" r="130" fill="#0A66C2" opacity="0.28" filter="url(#ct-blur)"/>
    <circle class="blob" cx="700" cy="90" r="120" fill="#0A84FF" opacity="0.22" filter="url(#ct-blur)" style="animation-delay: -7s"/>
  </g>

  <!-- glass panel -->
  <rect x="12" y="12" width="796" height="88" rx="20"
        fill="rgba(255,255,255,0.58)" stroke="rgba(255,255,255,0.95)" stroke-width="1.5"
        filter="url(#ct-shadow)"/>

  <!-- copy -->
  <text x="44" y="61" class="eyebrow">HOW TO REACH ME</text>

  <!-- pulsing LinkedIn button -->
  <rect class="ring" x="612" y="34" width="164" height="44" rx="22" fill="none" stroke="#0A66C2" stroke-width="2" opacity="0.6"/>
  <g class="btn">
    <rect x="612" y="34" width="164" height="44" rx="22" fill="#0A66C2"/>
    <rect x="628" y="45" width="22" height="22" rx="5" fill="rgba(255,255,255,0.18)"/>
    <text x="639" y="62" text-anchor="middle" class="in-glyph">in</text>
    <text x="662" y="61" class="btn-label">CONNECT &#8594;</text>
  </g>

  <!-- one-shot sheen sweep -->
  <g clip-path="url(#ct-clip)">
    <rect class="sheen" x="-260" y="0" width="200" height="112" fill="url(#ct-sheen-grad)"/>
  </g>
</svg>
