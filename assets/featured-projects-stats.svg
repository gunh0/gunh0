<svg width="820" height="254" viewBox="0 0 820 254" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Featured Projects: 18 total — Security &amp; DevSecOps 8, AI &amp; LLM Engineering 3, Systems &amp; Infrastructure 6, Foundations 1">
  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      fill: #1f2328;
    }
    .header { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
    .dim { fill: #6e7781; }
    .cursor { animation: blink 1.1s step-end infinite; }
    .blob { animation: drift 16s ease-in-out infinite alternate; }
    .b2 { animation-duration: 19s; animation-delay: -6s; }
    .b3 { animation-duration: 22s; animation-delay: -11s; }
    .b4 { animation-duration: 17s; animation-delay: -3s; }
    .sheen { animation: sweep 2.4s ease-in-out 0.5s 1 both; }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes drift { to { transform: translate(46px, 26px); } }
    @keyframes sweep { to { transform: translateX(1300px) skewX(-16deg); } }
    .label { font-size: 13.5px; font-weight: 600; }
    .count { font-size: 13.5px; font-weight: 700; }
    .total { font-size: 15px; font-weight: 700; }
    .bar {
      transform-box: fill-box;
      transform-origin: left;
      animation: grow 1.1s cubic-bezier(0.22, 1, 0.36, 1) backwards;
    }
    .d1 { animation-delay: 0.20s; }
    .d2 { animation-delay: 0.40s; }
    .d3 { animation-delay: 0.60s; }
    .d4 { animation-delay: 0.80s; }
    .fade { animation: fadein 0.5s ease-out backwards; }
    .f1 { animation-delay: 0.9s; }
    .f2 { animation-delay: 1.1s; }
    .f3 { animation-delay: 1.3s; }
    .f4 { animation-delay: 1.5s; }
    @keyframes grow { from { transform: scaleX(0); } }
    @keyframes fadein { from { opacity: 0; } }
  </style>

  <defs>
    <filter id="st-blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="st-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2328" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="st-sheen-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="st-glass-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.12" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="st-panel-clip">
      <rect x="16" y="16" width="788" height="222" rx="24"/>
    </clipPath>
  </defs>

  <!-- backdrop: soft base + drifting aurora blobs (the "behind the glass" layer) -->
  <rect width="820" height="254" rx="28" fill="#f2f4f8"/>
  <g clip-path="url(#st-panel-clip)">
    <circle class="blob b1" cx="120" cy="60" r="170" fill="#FF375F" opacity="0.30" filter="url(#st-blur)"/>
    <circle class="blob b2" cx="700" cy="40" r="150" fill="#30D158" opacity="0.30" filter="url(#st-blur)"/>
    <circle class="blob b3" cx="90" cy="194" r="160" fill="#FF9F0A" opacity="0.30" filter="url(#st-blur)"/>
    <circle class="blob b4" cx="740" cy="204" r="180" fill="#0A84FF" opacity="0.30" filter="url(#st-blur)"/>
  </g>

  <!-- glass panel -->
  <rect x="16" y="16" width="788" height="222" rx="24"
        fill="rgba(255,255,255,0.58)" stroke="rgba(255,255,255,0.95)" stroke-width="1.5"
        filter="url(#st-shadow)"/>
  <rect x="16" y="16" width="788" height="222" rx="24"
        fill="url(#st-glass-edge)"/>

  <!-- header -->
  <text x="48" y="54" class="header">Featured Projects<tspan class="cursor" fill="#6e7781">_</tspan></text>
  <text x="772" y="54" text-anchor="end" class="total"><tspan class="dim">TOTAL </tspan>18</text>

  <!-- Security & DevSecOps 8/18 -->
  <text x="48" y="95" class="label">🔒 SECURITY &amp; DEVSECOPS</text>
  <rect x="340" y="84" width="380" height="12" rx="6" fill="rgba(31,35,40,0.07)"/>
  <rect x="340" y="84" width="169" height="12" rx="6" fill="#FF375F" class="bar d1"/>
  <text x="772" y="95" text-anchor="end" class="count fade f1" fill="#FF375F">8</text>

  <!-- AI & LLM Engineering 3/18 -->
  <text x="48" y="134" class="label">🤖 AI &amp; LLM</text>
  <rect x="340" y="123" width="380" height="12" rx="6" fill="rgba(31,35,40,0.07)"/>
  <rect x="340" y="123" width="63" height="12" rx="6" fill="#30D158" class="bar d2"/>
  <text x="772" y="134" text-anchor="end" class="count fade f2" fill="#30D158">3</text>

  <!-- Systems & Infrastructure 6/18 -->
  <text x="48" y="173" class="label">⚙️ SYSTEMS &amp; INFRA</text>
  <rect x="340" y="162" width="380" height="12" rx="6" fill="rgba(31,35,40,0.07)"/>
  <rect x="340" y="162" width="127" height="12" rx="6" fill="#FF9F0A" class="bar d3"/>
  <text x="772" y="173" text-anchor="end" class="count fade f3" fill="#FF9F0A">6</text>

  <!-- Foundations 1/18 -->
  <text x="48" y="212" class="label">📚 FOUNDATIONS</text>
  <rect x="340" y="201" width="380" height="12" rx="6" fill="rgba(31,35,40,0.07)"/>
  <rect x="340" y="201" width="21" height="12" rx="6" fill="#0A84FF" class="bar d4"/>
  <text x="772" y="212" text-anchor="end" class="count fade f4" fill="#0A84FF">1</text>

  <!-- one-shot sheen sweep across the glass -->
  <g clip-path="url(#st-panel-clip)">
    <rect class="sheen" x="-260" y="0" width="200" height="254" fill="url(#st-sheen-grad)"/>
  </g>
</svg>
